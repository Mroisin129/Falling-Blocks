<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Definitely Playable</title>
<style>
  body {
    background: hotpink; /* 💖 CHAOS */
    color: black;
    text-align: center;
    font-family: Arial;
  }

  canvas {
    background: black;
    margin-top: 20px;
    border: 3px solid white;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🧱 Just Press Play...</h1>
<p>This should work perfectly.</p>

<button id="playBtn">▶ Play</button>

<br>
<canvas id="game" width="300" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const playBtn = document.getElementById("playBtn");

const COLS = 10;
const ROWS = 20;
const SIZE = 25;

let piece;
let running = false;

const colors = ["cyan","yellow","purple","lime","red","blue","orange"];

function createPiece() {
  return {
    x: 4,
    y: 0,
    shape: [[1,1],[1,1]],
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random() - 0.5) * 2,
    vy: 2
  };
}

// Draw
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!piece) return;

  ctx.fillStyle = piece.color;

  piece.shape.forEach((row, y) => {
    row.forEach((val, x) => {
      if (val) {
        ctx.fillRect(
          (piece.x + x) * SIZE,
          (piece.y + y) * SIZE,
          SIZE-2,
          SIZE-2
        );
      }
    });
  });
}

// Update
function update() {
  if (!piece) return;

  piece.x += piece.vx;
  piece.y += piece.vy;

  piece.vy += 0.2; // gravity

  // Bounce walls
  if (piece.x < 0 || piece.x > COLS - 2) {
    piece.vx *= -1;
  }

  // Bounce floor
  if (piece.y > ROWS - 2) {
    piece.y = ROWS - 2;
    piece.vy *= -0.7;

    piece.vx += (Math.random() - 0.5) * 2;
  }

  // Random drift
  if (Math.random() < 0.03) {
    piece.vx += (Math.random() - 0.5) * 1.5;
  }

  // Random glitch
  if (Math.random() < 0.02) {
    piece.shape.reverse();
  }

  // Respawn piece
  if (Math.abs(piece.vy) < 0.5 && piece.y > ROWS - 3) {
    piece = createPiece();
  }
}

// Controls (still terrible 😈)
document.addEventListener("keydown", e => {
  if (!running || !piece) return;

  if (e.key === "ArrowLeft") piece.vx -= 1.5;
  if (e.key === "ArrowRight") piece.vx += 1.5;
  if (e.key === "ArrowDown") piece.vy += 2;
  if (e.key === "ArrowUp") {
    if (Math.random() < 0.5) piece.shape.reverse();
  }
});

// Game loop
function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// ▶ Start game
playBtn.addEventListener("click", () => {
  piece = createPiece();
  running = true;
  loop();
});
</script>

</body>
</html>
